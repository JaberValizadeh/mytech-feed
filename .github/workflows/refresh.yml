name: Refresh feed

on:
  schedule:
    # UTC-only cron can't follow Sydney DST, so fire four slots that bracket
    # 6 AM / 6 PM Sydney year-round. publish.ts gates on the real Sydney hour,
    # so exactly two of these do work each day (the rest exit immediately).
    - cron: "0 7,8,19,20 * * *"
  workflow_dispatch: # manual "refresh now"

# Only one refresh at a time; never cancel a run mid-way (it would waste the
# OpenAI spend already incurred and could commit a half-built store).
concurrency:
  group: refresh
  cancel-in-progress: false

permissions:
  contents: write # commit the refreshed data/ cache back
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Aggregate + build static feed
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # data/ is committed, so this run reuses the enrichment cache and only
          # pays OpenAI for genuinely new articles.
          DATA_DIR: ${{ github.workspace }}/data
          FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
          # 42 channels x 5 videos = 210 raw; the 150 default would silently
          # crowd whole channels out of the store.
          MAX_STORED_VIDEOS: "250"
        run: npm run publish

      - name: Commit refreshed cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No data change (skipped slot or nothing new)."
          else
            git commit -m "chore(data): refresh feed [skip ci]"
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deploy
        uses: actions/deploy-pages@v4
