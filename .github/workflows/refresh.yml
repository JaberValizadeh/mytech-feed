name: Refresh feed

on:
  schedule:
    # Every 2 hours. GitHub fires crons late (minutes to hours) and sparse slots
    # let the refresh anchor drift into a once-a-day rhythm. publish.ts gates on
    # FEED AGE (>=11h): the first slot past the threshold refreshes, the rest
    # exit in ~2 min. Net cadence: every 11-13h regardless of delays or anchor.
    - cron: "0 */2 * * *"
  workflow_dispatch: # manual "refresh now"

# Only one refresh at a time; never cancel a run mid-way (it would waste the
# OpenAI spend already incurred and could commit a half-built store).
concurrency:
  group: refresh
  cancel-in-progress: false

permissions:
  contents: write # commit the refreshed data/ cache back
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # A rate-limited batch must fail loudly, not silently burn hours.
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Aggregate + build static feed
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # data/ is committed, so this run reuses the enrichment cache and only
          # pays OpenAI for genuinely new articles.
          DATA_DIR: ${{ github.workspace }}/data
          FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
          # 42 channels x 5 videos = 210 raw; the 150 default would silently
          # crowd whole channels out of the store.
          MAX_STORED_VIDEOS: "250"
          # Default of 2 makes a large backlog crawl. The runner is not the
          # bottleneck; OpenAI rate limits are, and the SDK backs off on 429.
          AI_CONCURRENCY: "6"
        run: npm run publish

      - name: Commit refreshed cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No data change (skipped slot or nothing new)."
          else
            git commit -m "chore(data): refresh feed [skip ci]"
            # The aggregate step takes minutes; a code push landing meanwhile
            # would make this push non-fast-forward and fail the whole run.
            git pull --rebase origin main
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deploy
        uses: actions/deploy-pages@v4
